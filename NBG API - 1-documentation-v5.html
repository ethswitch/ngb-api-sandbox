ication/json` | \u2705 Yes |  |\n      | `Accept` | `application/json` | \u2705 Yes |  |\n      | `Authorization` | `Bearer {{bearerToken}}` | \u2705 Yes |  |\n      | `X-Correlation-ID` | UUID string | \u2B1C Optional | For request tracing |\n      | `X-Idempotency-Key` | Unique key | \u2B1C Optional | Prevents duplicate processing |\n\n      ---\n\n      ### Payment Method\n\n      `payment_method: \"ALIAS\"` \u2014 The payer is identified by an **alias** rather than an account number. The alias type and value must be provided:\n\n      | Alias Type | Example Value | Description |\n      | --- | --- | --- |\n      | `MSISDN` | `+251911223344` | Mobile phone number |\n      | `EMAIL` | `user@example.com` | Email address |\n      | `NATIONAL_ID` | `ETH-123456789` | National identification number |\n\n      The `payer_dfs` field identifies the Digital Financial Service provider (e.g., `TELEBIRR`, `MPESA`).\n\n      ---\n\n      ### Key Request Fields\n\n      | Field | Type | Description |\n      | --- | --- | --- |\n      | `payer.alias_type` | string | Type of alias: `MSISDN`, `EMAIL`, `NATIONAL_ID` |\n      | `payer.alias` | string | The alias value (e.g., phone number) |\n      | `payer.payer_dfs` | string | DFS provider: `TELEBIRR`, `MPESA`, etc. |\n      | `payment_initiation.payment_method` | string | Must be `\"ALIAS\"` |\n      | `payment_initiation.authorization_channel` | string | `OTP`, `PIN`, etc. |\n      | `bill_info.amount_due` | number | Amount to be paid |\n      | `bill_info.currency` | string | Currency code (e.g., `ETB`) |\n      | `idempotency_key` | string | Unique key to prevent duplicate payments |\n\n      ---\n\n      ### Expected Response\n\n      A `200 OK` or `201 Created` response with payment status `PENDING` and a `transaction_id` for tracking.\n  - info:\n      name: Initiate Payment (QR)\n      type: http\n      seq: 4\n    http:\n      method: POST\n      url: '{{baseUrl}}/api/v1/payments/initiate'\n      headers:\n        - name: est_id` | `string` | Yes | Reference to the registered payment order |\n      | `payment_initiation.payment_method` | `string` | Yes | Must be `\"QR\"` for this flow |\n      | `idempotencyKey` | `string` | Recommended | Prevents duplicate payment processing |\n\n      ---\n\n      ### Expected Response\n\n      **`200 OK`** \u2014 Payment initiation accepted. Returns a QR code payload or reference for the payer to scan.\n\n      ```json\n      {\n        \"status\": \"PENDING\",\n        \"transaction_id\": \"txn-9a1b2c3d-4e5f-6789-abcd-ef0123456789\",\n        \"payment_method\": \"QR\",\n        \"qr_code\": \"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...\",\n        \"qr_string\": \"00020101021226370016A000000677010111011300251911223344520400005303230540519.755802ET5915Ethiopian Elec6002AA630445F2\",\n        \"expires_at\": \"2026-04-20T13:46:44.380Z\",\n        \"amount\": 190.75,\n        \"currency\": \"ETB\",\n        \"bill_payment_request_id\": \"3fd50603-19bc-44a4-ab14-320c68919bcf\"\n      }\n      ```\n    examples:\n      - name: Initiate Payment (QR)\n        request:\n          url: '{{baseUrl}}/api/v1/payments/initiate'\n          method: POST\n          headers:\n            - name: Content-Type\n              value: application/json\n            - name: Accept\n              value: application/json\n            - name: X-Correlation-ID\n              value: 969e975f-9fec-c965-c6ad-2ff0aaf3e8cb\n              disabled: true\n            - name: X-Idempotency-Key\n              value: idemp-12345678\n              disabled: true\n            - name: Authorization\n              value: Bearer {{bearerToken}}\n          body:\n            type: json\n            data: |-\n              {\n                  \"timestamp\": \"2026-05-28T08:31:23.645074771Z\",\n                  \"channel\": \"API\",\n                  \"payer\": {\n                      \"payer_id\": \"7e7f2a72-b28a-4870-89d2-c265f071708f\",\n                      \"external_id\": n            value: '0'\n            - name: X-Frame-Options\n              value: DENY\n            - name: Date\n              value: Thu, 28 May 2026 08:31:57 GMT\n            - name: Access-Control-Allow-Origin\n              value: '*'\n            - name: Access-Control-Expose-Headers\n              value: Location,Content-Disposition\n            - name: X-Kong-Upstream-Latency\n              value: '68'\n            - name: X-Kong-Proxy-Latency\n              value: '0'\n            - name: Via\n              value: kong/3.6.1\n            - name: X-Kong-Request-Id\n              value: 2f75d73714fee31fda668f5e6af96065\n          body:\n            type: json\n            data: |-\n              {\n                  \"order_reference\": \"058fac1d-808e-4144-a377-cd6e50f3eafd\",\n                  \"hpp_url\": \"http://197.156.90.228/nbg/pay/b256a594-56b3-48ce-963e-c71d688c0410\",\n                  \"expires_at\": \"2026-05-29T08:31:57.398230018Z\",\n                  \"biller_name\": \"Ethiopian Electric Utility\",\n                  \"merchant_order_number\": \"ORD-867-70574\",\n                  \"hpp_token\": \"b256a594-56b3-48ce-963e-c71d688c0410\",\n                  \"amount\": 15.75,\n                  \"currency\": \"ETB\"\n              }\nrequest:\n  auth:\n    type: bearer\n    token: '{{token}}'\ndocs:\n  content: |\n    NBG API provides a streamlined payment workflow for authenticating users, registering payment orders, and initiating customer payments.\n\n    This collection is designed to support merchants, integrators, and internal teams that need to manage payment initiation through either direct API-based flows or Hosted Payment Page (HPP) flows.\n\n    The collection currently includes endpoints for:\n\n    - User authentication\n        \n    - Payment order registration for API-based flows\n        \n    - Payment order registration for Hosted Payment Page flows\n        \n    - Payment initiation using account-based or alias-based payer identification\n        \n\n    Base URL  \n    All protected endpoints use the environment variable:\n\n    `{{baseUrl}}`\n\n    Authentication  \n    Most endpoints in this collection require bearer token authentication. Use the Authenticate request first, then store the returned token as `{{bearerToken}}` before calling protected endpoints.\n\n    Supported payment initiation methods  \n    The payment initiation API supports the following payer methods:\n\n    - Account\n        \n    - Alias\n        \n\n    Supported alias types  \n    Alias-based payments support the following values:\n\n    | UI Display | API Value | Description | Format |\n    | --- | --- | --- | --- |\n    | Phone Number | `MSISDN` | Mobile number | `+251-XXX-XXXXXX` |\n    | Email | `EMAIL_ADDRESS` | Email address | `name@domain.com` |\n    | National ID | `NATIONAL_ID` | National ID number | `12 or 16 digits` |\n    | Free Text | `FREE_FORMAT` | Custom identifier | Alphanumeric with underscores |\n\n    Recommended integration flow\n\n    1. Authenticate and obtain an access token.\n        \n    2. Register a payment order using either the API-based or HPP-based flow.\n        \n    3. Initiate payment with the appropriate payer details.\n        \n    4. Track the response and continue customer authorization where required.\n        \n\n    Operational recommendations\n\n    - Send `Content-Type: application/json` and `Accept: application/json` for all JSON endpoints.\n        \n    - Include `X-Correlation-ID` for request traceability.\n        \n    - Include an idempotency key for create/initiate operations to safely retry requests.\n        \n    - Use unique merchant order references for each payment request.\n        \n    - Ensure callback and redirect URLs are valid and reachable.\n        \n\n    Who this collection is for  \n    This collection is intended for:\n\n    - Payment integrators\n        \n    - Merchant backend teams\n        \n    - QA and testing teams\n        \n    - API consumers integrating customer payment journeys\n        \n\n    Notes  \n    The sample payloads in this collection illustrate common request structures and should be adapted to your environment, token strategy, merchant references, and customer data policies.\n\n\n    ## Payment Completion Callback Specification\n\n    ### 1. JSON Payload Structure\n    Below is the Json paylaod  delivered during the payment completion callback execution:\n\n    ```json\n    {\n      \"status\": \"PAID\",\n      \"current_status\": \"PAID\",\n      \"message\": \"Payment successfully processed\",\n      \"errors\": null,\n      \"timestamp\": \"2026-05-28T09:41:16.677Z\",\n      \"correlation_id\": \"corr-8f9b2c4a-6d1e-4f3b-9a7c-8e5d3c2b1a0f\",\n      \"transaction_id\": \"PAY260528091942549\",\n      \"http_status\": 200,\n      \"content_type\": \"application/json\",\n      \"data\": {\n        \"bill_payment_request_id\": \"a1bcd86f-f5b6-4e83-85b8-c9d6b2244e10\",\n        \"request_id\": \"5709483855\",\n        \"timestamp\": \"2026-05-28T09:18:59.370Z\",\n        \"transaction_type\": \"PAYMENT\",\n        \"channel\": \"MOBILE\",\n        \"current_status\": \"PAID\",\n        \"payer\": {\n          \"payerId\": \"ce7c419e-f068-4d5f-96a3-66d875944675\",\n          \"externalId\": null,\n          \"payerName\": \"Nahom Molla\",\n          \"accountNumber\": null,\n          \"payerDfs\": null,\n          \"aliasType\": null,\n          \"alias\": null\n        },\n        \"biller\": {\n          \"billerId\": \"07d142f6-61bb-4840-8fc5-e1521a29f23a\",\n          \"billerIdentificationNumber\": \"NEEUETAA\",\n          \"billerName\": \"Ethiopian Electric Utility\",\n          \"billerCategory\": null,\n          \"branchCode\": \"AA01\"\n        },\n        \"bill_info\": {\n          \"billId\": \"5709483855\",\n          \"externalReferenceNumber\": null,\n          \"billType\": \"BILL\",\n          \"currency\": \"ETB\",\n          \"amountDue\": 100.7900,\n          \"generatedAt\": \"2026-05-28T09:19:32.184Z\",\n          \"startAt\": \"2026-05-28T09:19:32.184Z\",\n          \"dueDate\": \"2026-12-26T09:19:32.182Z\",\n          \"status\": \"QUERIED\",\n          \"billNumber\": \"5709483855\",\n          \"paymentRequestNumber\": null,\n          \"accountNumber\": \"100000220600\",\n          \"serviceNumber\": null,\n          \"meterNumber\": null,\n          \"contractNumber\": null,\n          \"lineItems\": null,\n          \"adjustments\": null,\n          \"totalAmount\": 100.7900,\n          \"remark\": null\n        }\n      }\n    }\n\n    ```\n    Here is the **Data Field Glossary** reformatted to use the exact structure and spacing you requested:\n\n    ### Data Field Glossary\n\n    | UI Display | API Value | Description | Format |\n    | --- | --- | --- | --- |\n    | Status | `status` | Overall envelope transaction state flags | `PAID` / `FAILED` |\n    | Current Status | `current_status` | Current execution state block processing identifier | `PAID` |\n    | Message | `message` | Human-readable operational confirmation or breakdown info text | String |\n    | Timestamp | `timestamp` | The specific date and time instance of processing execution | `ISO 8601` |\n    | Correlation ID | `correlation_id` | Unique end-to-end distributed tracking identifier across service hops | UUID |\n    | Transaction ID | `transaction_id` | Core underlying payment transaction processing receipt reference | Alphanumeric |\n    | HTTP Status | `http_status` | The numeric representation code for processing state routing tracking | `200`, `400`, `500` |\n    | Content Type | `content_type` | Payload media type verification header descriptor | `application/json` |\n    | Bill Payment Request ID | `data.bill_payment_request_id` | Unique tracking identifier assigned when request is captured by the core system | UUID |\n    | Request ID | `data.request_id` | The initial system request identifier mapping back to inquiry tracking
